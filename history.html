<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Workout Plan</a>
        <a href="technique.html">Technique</a>
        <a href="about.html">About Jeff</a>
        <a href="log.html">Log Workout</a>
        <a href="history.html">Progress History</a>
        <button type="button" id="darkModeButton">Dark Mode</button>
    </nav>

    <h1>Progress History</h1>
    <hr>

    <h2 id="historyTitle"></h2>

    <div class="formBox">
        <h2>Filter Workouts</h2>

        <label for="filterDay">Workout Day:</label>
        <select id="filterDay">
            <option value="All">All</option>
            <option value="Push Hypertrophy">Push Hypertrophy</option>
            <option value="Pull Hypertrophy">Pull Hypertrophy</option>
            <option value="Legs Hypertrophy">Legs Hypertrophy</option>
            <option value="Upper Body Strength">Upper Body Strength</option>
            <option value="Lower Body Strength">Lower Body Strength</option>
        </select>

        <label for="filterExercise">Exercise:</label>
        <select id="filterExercise">
            <option value="All">All</option>
        </select>

        <button type="button" id="filterButton">Filter</button>
        <button type="button" id="showAllButton">Show All</button>
    </div>

    <p id="emptyMessage"></p>

    <table id="historyTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Workout Day</th>
                <th>Exercise</th>
                <th>Set Details</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="historyBody">
        </tbody>
    </table>

    <footer>
        <hr>
        <p>Website created by Bodhi Pugliese</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
